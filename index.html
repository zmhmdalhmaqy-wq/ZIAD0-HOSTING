<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>لوحة التحكم | DARK PRO HOST</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* تأثير زجاجي داكن */
        .glass {
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(108, 92, 231, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* الشريط العلوي */
        .navbar {
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(108, 92, 231, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7, #a363d9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            background: linear-gradient(135deg, #6c5ce7, #a363d9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-greeting {
            font-size: 0.85rem;
            color: #888;
        }

        .user-greeting strong {
            color: #6c5ce7;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        /* بطاقات الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(18, 18, 24, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: #6c5ce7;
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.15);
        }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #6c5ce7, #a363d9);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #e0e0e0;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            margin-top: 6px;
        }

        /* قسم السيرفرات */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e0e0e0;
        }

        .section-title i {
            color: #6c5ce7;
        }

        .create-btn {
            background: linear-gradient(135deg, #6c5ce7, #a363d9);
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .create-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
        }

        /* شبكة السيرفرات */
        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .server-card {
            background: rgba(18, 18, 24, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .server-card:hover {
            border-color: #6c5ce7;
            transform: translateY(-3px);
            background: rgba(25, 25, 35, 0.95);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.15);
        }

        .server-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            color: #6c5ce7;
        }

        .server-name {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #e0e0e0;
        }

        .server-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.7rem;
            color: #888;
        }

        .server-port {
            background: rgba(108, 92, 231, 0.15);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: #a363d9;
        }

        .server-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 30px;
            width: fit-content;
        }

        .status-online {
            background: rgba(0, 200, 100, 0.15);
            color: #00c864;
        }

        .status-offline {
            background: rgba(100, 100, 100, 0.15);
            color: #888;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-online {
            background: #00c864;
            box-shadow: 0 0 4px #00c864;
        }

        .dot-offline {
            background: #888;
        }

        /* تفاصيل السيرفر */
        .server-detail {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .server-detail.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .back-btn {
            background: rgba(18, 18, 24, 0.9);
            border: 1px solid rgba(108, 92, 231, 0.3);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6c5ce7;
        }

        .back-btn:hover {
            background: #6c5ce7;
            color: white;
        }

        .server-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #e0e0e0;
        }

        /* تبويبات */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            border-bottom: 2px solid rgba(108, 92, 231, 0.15);
            padding-bottom: 8px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 8px 4px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .tab-btn.active {
            color: #6c5ce7;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #6c5ce7, #a363d9);
            border-radius: 3px;
        }

        /* الكونسول */
        .console-box {
            background: #050508;
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 20px;
            padding: 18px;
            height: 320px;
            overflow-y: auto;
            font-family: 'Menlo', 'Courier New', monospace;
            font-size: 0.7rem;
            line-height: 1.5;
            color: #4ade80;
            white-space: pre-wrap;
            margin-bottom: 24px;
        }

        .console-box::-webkit-scrollbar {
            width: 5px;
        }
        .console-box::-webkit-scrollbar-track {
            background: #1e1e2a;
            border-radius: 5px;
        }
        .console-box::-webkit-scrollbar-thumb {
            background: #6c5ce7;
            border-radius: 5px;
        }

        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .info-chip {
            background: rgba(18, 18, 24, 0.9);
            border: 1px solid rgba(108, 92, 231, 0.15);
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
        }

        .info-chip span:first-child {
            color: #888;
        }

        .info-chip span:last-child {
            font-weight: 600;
            color: #e0e0e0;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0 28px;
        }

        .action-btn {
            padding: 8px 22px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'Tajawal', sans-serif;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-start {
            background: rgba(0, 200, 100, 0.15);
            color: #00c864;
            border: 1px solid rgba(0, 200, 100, 0.2);
        }
        .btn-start:hover { background: rgba(0, 200, 100, 0.25); transform: translateY(-2px); }

        .btn-stop {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }
        .btn-stop:hover { background: rgba(255, 107, 107, 0.25); transform: translateY(-2px); }

        .btn-restart {
            background: rgba(255, 170, 0, 0.15);
            color: #ffaa00;
            border: 1px solid rgba(255, 170, 0, 0.2);
        }
        .btn-restart:hover { background: rgba(255, 170, 0, 0.25); transform: translateY(-2px); }

        .btn-delete {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }
        .btn-delete:hover { background: rgba(255, 107, 107, 0.25); transform: translateY(-2px); }

        /* جدول الملفات */
        .files-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
        }

        .files-table th {
            text-align: right;
            padding: 12px 8px;
            color: #888;
            font-weight: 600;
            border-bottom: 2px solid rgba(108, 92, 231, 0.15);
        }

        .files-table td {
            padding: 12px 8px;
            border-bottom: 1px solid rgba(108, 92, 231, 0.08);
        }

        .file-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .file-btn {
            background: transparent;
            border: none;
            font-size: 0.7rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 20px;
            transition: 0.2s;
            font-family: 'Tajawal', sans-serif;
        }

        .file-download {
            color: #00c864;
            background: rgba(0, 200, 100, 0.08);
        }
        .file-rename {
            color: #ffaa00;
            background: rgba(255, 170, 0, 0.08);
        }
        .file-edit {
            color: #6c5ce7;
            background: rgba(108, 92, 231, 0.08);
        }
        .file-delete {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.08);
        }
        .file-btn:hover {
            transform: translateY(-1px);
        }

        .upload-area {
            border: 2px dashed #6c5ce7;
            background: rgba(108, 92, 231, 0.05);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-area:hover {
            background: rgba(108, 92, 231, 0.1);
            border-color: #a363d9;
        }

        /* مودال */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #121218;
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 28px;
            width: 90%;
            max-width: 600px;
            padding: 28px;
            animation: fadeIn 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #2a2a35;
        }

        .modal-title {
            font-weight: 700;
            font-size: 1rem;
            color: #e0e0e0;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #888;
        }

        textarea, input {
            background: #1a1a24;
            border: 2px solid #2a2a35;
            border-radius: 16px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-family: 'Tajawal', monospace;
            font-size: 0.8rem;
            width: 100%;
            transition: 0.3s;
        }

        textarea:focus, input:focus {
            border-color: #6c5ce7;
            outline: none;
        }

        .search-box {
            width: 100%;
            padding: 10px 16px;
            border: 2px solid #2a2a35;
            border-radius: 30px;
            margin-bottom: 20px;
            background: #1a1a24;
            color: #e0e0e0;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a24;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1100;
            display: none;
            font-size: 0.8rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(108, 92, 231, 0.3);
        }

        @media (max-width: 720px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .container { padding: 20px 16px; }
            .stat-value { font-size: 1.3rem; }
            .server-title { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <i class="fas fa-bolt"></i>
            <span>DARK PRO HOST</span>
        </div>
        <div class="user-section">
            <div class="user-greeting"><i class="far fa-user-circle"></i> مرحباً، <strong id="username">...</strong></div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
    </div>

    <div class="container" id="appContainer">
        <!-- الصفحة الرئيسية -->
        <div id="homeView">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon"><i class="fas fa-server"></i></div>
                    </div>
                    <div class="stat-value" id="usedServers">0/0</div>
                    <div class="stat-label">السيرفرات المستخدمة</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
                    </div>
                    <div class="stat-value" id="expiryDays">--</div>
                    <div class="stat-label">المتبقي من الصلاحية</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon"><i class="fas fa-microchip"></i></div>
                    </div>
                    <div class="stat-value" id="cpuMetric">0%</div>
                    <div class="stat-label">استخدام المعالج</div>
                </div>
                <div class="stat-card">
                    <div class="stat-header">
                        <div class="stat-icon"><i class="fas fa-memory"></i></div>
                    </div>
                    <div class="stat-value" id="ramMetric">0%</div>
                    <div class="stat-label">الذاكرة</div>
                </div>
            </div>

            <div class="section-header">
                <div class="section-title"><i class="fas fa-cubes"></i> السيرفرات النشطة</div>
                <button class="create-btn" onclick="createNewServer()"><i class="fas fa-plus"></i> سيرفر جديد</button>
            </div>
            <div class="servers-grid" id="serversGrid">
                <div style="text-align:center; padding:40px; color:#888;">جاري التحميل...</div>
            </div>
        </div>

        <!-- صفحة تفاصيل السيرفر -->
        <div id="detailView" class="server-detail">
            <div class="detail-header">
                <button class="back-btn" onclick="goHome()"><i class="fas fa-arrow-right"></i> العودة</button>
                <div class="server-title" id="detailTitle"></div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('console')">🖥️ الكونسول</button>
                <button class="tab-btn" onclick="switchTab('files')">📁 الملفات</button>
            </div>
            <div id="consoleTab">
                <div class="console-box" id="consoleOut"></div>
                <div class="info-row" id="statusRow"></div>
                <div class="action-buttons">
                    <button class="action-btn btn-start" onclick="serverAction('start')"><i class="fas fa-play"></i> تشغيل</button>
                    <button class="action-btn btn-restart" onclick="serverAction('restart')"><i class="fas fa-sync-alt"></i> إعادة تشغيل</button>
                    <button class="action-btn btn-stop" onclick="serverAction('stop')"><i class="fas fa-stop"></i> إيقاف</button>
                    <button class="action-btn btn-delete" onclick="confirmDelete()"><i class="fas fa-trash"></i> حذف</button>
                </div>
            </div>
            <div id="filesTab" style="display:none;">
                <div class="upload-area" onclick="document.getElementById('fileUpload').click()" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
                    <i class="fas fa-cloud-upload-alt"></i> اسحب الملفات أو انقر للرفع
                </div>
                <input type="file" id="fileUpload" multiple style="display:none" onchange="uploadFiles(this.files)">
                <div class="action-buttons" style="margin-top:8px">
                    <button class="action-btn btn-start" style="background:rgba(108,92,231,0.15);color:#6c5ce7" onclick="installPackages()"><i class="fas fa-cube"></i> تثبيت المكتبات</button>
                    <button class="action-btn btn-start" style="background:rgba(108,92,231,0.15);color:#6c5ce7" onclick="showCreateFileModal()"><i class="fas fa-file"></i> ملف جديد</button>
                </div>
                <input type="text" class="search-box" id="fileSearch" placeholder="🔍 بحث في الملفات..." onkeyup="filterFiles()">
                <table class="files-table">
                    <thead>
                        <tr><th>الاسم</th><th>الحجم</th><th>الإجراءات</th></tr>
                    </thead>
                    <tbody id="filesList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- مودال تحرير الملف -->
    <div id="editorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="editorFileName">تحرير الملف</span>
                <button class="modal-close" onclick="closeEditor()">✕</button>
            </div>
            <textarea id="editorArea" rows="14"></textarea>
            <div style="margin-top:16px">
                <button class="create-btn" style="width:100%" onclick="saveFile()">💾 حفظ التغييرات</button>
            </div>
        </div>
    </div>

    <!-- مودال تأكيد -->
    <div id="confirmModal" class="modal">
        <div class="modal-content" style="max-width:350px">
            <div class="modal-header">
                <span class="modal-title">تأكيد العملية</span>
            </div>
            <p id="confirmMsg" style="margin:16px 0; color:#888">هل أنت متأكد؟</p>
            <div style="display:flex; gap:12px">
                <button class="create-btn" style="background:#ff6b6b" id="confirmYesBtn">تأكيد</button>
                <button class="logout-btn" style="background:#2a2a35;color:#e0e0e0" onclick="closeConfirm()">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- مودال إنشاء ملف -->
    <div id="createFileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">📄 إنشاء ملف جديد</span>
                <button class="modal-close" onclick="closeCreateFileModal()">✕</button>
            </div>
            <input type="text" id="newFileName" placeholder="الاسم (مثال: main.py)" style="margin-bottom:12px">
            <textarea id="newFileContent" rows="5" placeholder="محتوى الملف (اختياري)"></textarea>
            <div style="margin-top:16px">
                <button class="create-btn" style="width:100%" onclick="createFile()">إنشاء</button>
            </div>
        </div>
    </div>

    <!-- مودال تعديل اسم الملف -->
    <div id="renameFileModal" class="modal">
        <div class="modal-content" style="max-width:400px">
            <div class="modal-header">
                <span class="modal-title">✏️ تعديل اسم الملف</span>
                <button class="modal-close" onclick="closeModal('renameFileModal')">✕</button>
            </div>
            <div class="form-group">
                <label style="color:#888; margin-bottom:8px; display:block;">الاسم الجديد</label>
                <input type="text" id="renameFileName" placeholder="الاسم الجديد">
            </div>
            <div style="margin-top:16px">
                <button class="create-btn" style="width:100%" onclick="confirmRenameFile()">تأكيد التعديل</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let currentServer = null;
        let polling = null;
        let currentFile = null;
        let confirmAction = null;
        let currentRenameFile = null;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#ff6b6b' : '#00c864';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function showConfirm(msg, callback) {
            document.getElementById('confirmMsg').innerText = msg;
            confirmAction = callback;
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeConfirm() {
            document.getElementById('confirmModal').classList.remove('active');
            confirmAction = null;
        }

        function executeConfirm() {
            if (confirmAction) confirmAction();
            closeConfirm();
        }
        document.getElementById('confirmYesBtn').onclick = executeConfirm;

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function escapeHtml(str) {
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function checkAuth() {
            try {
                const res = await fetch('/api/current_user');
                const data = await res.json();
                if (!data.success) {
                    window.location.href = '/login';
                } else {
                    document.getElementById('username').innerText = data.username;
                    loadServers();
                    fetchMetrics();
                    setInterval(fetchMetrics, 8000);
                }
            } catch(e) {
                window.location.href = '/login';
            }
        }

        async function fetchMetrics() {
            try {
                const res = await fetch('/api/system/metrics');
                const d = await res.json();
                document.getElementById('cpuMetric').innerText = d.cpu + '%';
                document.getElementById('ramMetric').innerText = d.memory + '%';
            } catch(e) {}
        }

        async function loadServers() {
            const res = await fetch('/api/servers');
            const d = await res.json();
            if (!d.success) return;
            
            const used = d.stats.used, total = d.stats.total;
            document.getElementById('usedServers').innerText = `${used}/${total}`;
            document.getElementById('expiryDays').innerText = d.stats.expiry;
            
            const grid = document.getElementById('serversGrid');
            if (d.servers.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:40px;color:#888;">🚀 لا توجد سيرفرات، اضغط على "سيرفر جديد" للبدء</div>';
                return;
            }
            
            grid.innerHTML = '';
            d.servers.forEach(s => {
                const card = document.createElement('div');
                card.className = 'server-card';
                card.innerHTML = `
                    <div class="server-icon"><i class="fas fa-cube"></i></div>
                    <div class="server-name">${escapeHtml(s.title)}</div>
                    <div class="server-meta">
                        <span class="server-port"><i class="fas fa-plug"></i> ${s.port || 'N/A'}</span>
                        <span class="server-status ${s.status === 'Running' ? 'status-online' : 'status-offline'}">
                            <span class="status-dot ${s.status === 'Running' ? 'dot-online' : 'dot-offline'}"></span>
                            ${s.status === 'Running' ? 'يعمل' : 'متوقف'}
                        </span>
                    </div>
                `;
                card.onclick = () => openServer(s);
                grid.appendChild(card);
            });
        }

        function openServer(s) {
            currentServer = s;
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('detailView').classList.add('active');
            document.getElementById('detailTitle').innerHTML = `<i class="fas fa-server"></i> ${escapeHtml(s.title)}`;
            switchTab('console');
            if (polling) clearInterval(polling);
            fetchStats();
            polling = setInterval(fetchStats, 4000);
        }

        async function fetchStats() {
            if (!currentServer) return;
            try {
                const res = await fetch(`/api/server/stats/${currentServer.folder}`);
                const d = await res.json();
                if (!d.success) return;
                
                document.getElementById('consoleOut').innerText = d.logs || 'لا توجد مخرجات';
                document.getElementById('consoleOut').scrollTop = document.getElementById('consoleOut').scrollHeight;
                
                const statusDiv = document.getElementById('statusRow');
                statusDiv.innerHTML = `
                    <div class="info-chip"><span>الحالة</span><span>${d.status === 'Running' ? '🟢 يعمل' : '⚫ متوقف'}</span></div>
                    <div class="info-chip"><span>الذاكرة</span><span>${d.mem || '0 MB'}</span></div>
                    <div class="info-chip"><span>وقت التشغيل</span><span>${d.uptime || '0'}</span></div>
                    <div class="info-chip"><span>المنفذ</span><span>${d.port || 'N/A'}</span></div>
                    <div class="info-chip"><span>IP</span><span>${d.ip || 'N/A'}</span></div>
                `;
            } catch(e) {}
        }

        async function serverAction(act) {
            if (act === 'delete') { confirmDelete(); return; }
            showToast(`جاري ${act === 'start' ? 'التشغيل' : act === 'stop' ? 'الإيقاف' : 'إعادة التشغيل'}...`);
            const res = await fetch(`/api/server/action/${currentServer.folder}/${act}`, {method: 'POST'});
            const d = await res.json();
            if (d.success) {
                showToast(d.message, false);
                if (act !== 'stop') setTimeout(fetchStats, 1000);
            } else {
                showToast(d.message || 'فشل العملية', true);
            }
        }

        function confirmDelete() {
            showConfirm('⚠️ حذف السيرفر نهائياً؟ لا يمكن التراجع!', async () => {
                const res = await fetch(`/api/server/action/${currentServer.folder}/delete`, {method: 'POST'});
                const d = await res.json();
                if (d.success) {
                    showToast('✅ تم حذف السيرفر');
                    if (polling) clearInterval(polling);
                    goHome();
                } else {
                    showToast(d.message || 'فشل الحذف', true);
                }
            });
        }

        function goHome() {
            document.getElementById('homeView').style.display = 'block';
            document.getElementById('detailView').classList.remove('active');
            if (polling) clearInterval(polling);
            currentServer = null;
            loadServers();
        }

        function switchTab(tab) {
            const con = document.getElementById('consoleTab');
            const fil = document.getElementById('filesTab');
            const btns = document.querySelectorAll('.tab-btn');
            
            if (tab === 'console') {
                con.style.display = 'block';
                fil.style.display = 'none';
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
            } else {
                con.style.display = 'none';
                fil.style.display = 'block';
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
                loadFiles();
            }
        }

        async function loadFiles() {
            const tbody = document.getElementById('filesList');
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center">جاري التحميل...</td></tr>';
            
            const res = await fetch(`/api/files/list/${currentServer.folder}`);
            const files = await res.json();
            
            if (files.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#888;">📂 لا توجد ملفات</td></tr>';
                return;
            }
            
            tbody.innerHTML = files.map(f => `
                <tr>
                    <td><i class="fas ${f.is_dir ? 'fa-folder' : 'fa-file'}"></i> ${escapeHtml(f.name)}</td>
                    <td>${f.size || '--'}</td>
                    <td class="file-actions">
                        <button class="file-btn file-download" onclick="downloadFile('${f.name}')"><i class="fas fa-download"></i> تحميل</button>
                        <button class="file-btn file-rename" onclick="showRenameModal('${f.name}')"><i class="fas fa-edit"></i> تعديل الاسم</button>
                        ${!f.is_dir ? `<button class="file-btn file-edit" onclick="editFile('${f.name}')"><i class="fas fa-code"></i> تعديل</button>` : ''}
                        <button class="file-btn file-delete" onclick="deleteFile('${f.name}')"><i class="fas fa-trash"></i> حذف</button>
                    </td>
                </tr>
            `).join('');
        }

        async function downloadFile(filename) {
            window.open(`/api/files/download/${currentServer.folder}/${encodeURIComponent(filename)}`, '_blank');
        }

        function showRenameModal(oldName) {
            currentRenameFile = oldName;
            document.getElementById('renameFileName').value = oldName;
            document.getElementById('renameFileModal').classList.add('active');
        }

        async function confirmRenameFile() {
            const newName = document.getElementById('renameFileName').value.trim();
            if (!newName) {
                showToast('⚠️ الرجاء إدخال اسم جديد', true);
                return;
            }
            
            const res = await fetch(`/api/files/rename/${currentServer.folder}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({old_name: currentRenameFile, new_name: newName})
            });
            const data = await res.json();
            if (data.success) {
                showToast('✅ تم تعديل الاسم');
                closeModal('renameFileModal');
                loadFiles();
            } else {
                showToast('❌ ' + (data.message || 'فشل التعديل'), true);
            }
        }

        async function editFile(name) {
            currentFile = name;
            const res = await fetch(`/api/files/content/${currentServer.folder}/${name}`);
            const d = await res.json();
            document.getElementById('editorFileName').innerText = name;
            document.getElementById('editorArea').value = d.content || '';
            document.getElementById('editorModal').classList.add('active');
        }

        async function saveFile() {
            if (!currentFile) return;
            const content = document.getElementById('editorArea').value;
            const res = await fetch(`/api/files/save/${currentServer.folder}/${currentFile}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content})
            });
            const d = await res.json();
            if (d.success) {
                showToast('✅ تم حفظ الملف');
                closeEditor();
                loadFiles();
            } else {
                showToast('❌ فشل الحفظ', true);
            }
        }

        function closeEditor() {
            document.getElementById('editorModal').classList.remove('active');
            currentFile = null;
        }

        async function deleteFile(name) {
            showConfirm(`🗑️ حذف ملف "${name}"؟`, async () => {
                const res = await fetch(`/api/files/delete/${currentServer.folder}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({names: [name]})
                });
                const d = await res.json();
                if (d.success) {
                    showToast('✅ تم حذف الملف');
                    loadFiles();
                } else {
                    showToast('❌ فشل الحذف', true);
                }
            });
        }

        async function uploadFiles(files) {
            if (!files.length) return;
            const fd = new FormData();
            for (let f of files) fd.append('files[]', f);
            
            const res = await fetch(`/api/files/upload/${currentServer.folder}`, {method: 'POST', body: fd});
            const d = await res.json();
            if (d.success) {
                showToast(d.message);
                loadFiles();
            } else {
                showToast('❌ فشل الرفع', true);
            }
            document.getElementById('fileUpload').value = '';
        }

        function handleDrop(e) {
            e.preventDefault();
            uploadFiles(e.dataTransfer.files);
        }

        async function installPackages() {
            showToast('📦 بدء تثبيت المكتبات...');
            const res = await fetch(`/api/server/install/${currentServer.folder}`, {method: 'POST'});
            const d = await res.json();
            showToast(d.message, !d.success);
        }

        function showCreateFileModal() {
            document.getElementById('newFileName').value = '';
            document.getElementById('newFileContent').value = '';
            document.getElementById('createFileModal').classList.add('active');
        }

        function closeCreateFileModal() {
            document.getElementById('createFileModal').classList.remove('active');
        }

        async function createFile() {
            const name = document.getElementById('newFileName').value.trim();
            const content = document.getElementById('newFileContent').value;
            if (!name) {
                showToast('⚠️ أدخل اسم الملف', true);
                return;
            }
            
            const res = await fetch(`/api/files/create/${currentServer.folder}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({filename: name, content})
            });
            const d = await res.json();
            if (d.success) {
                showToast(d.message);
                closeCreateFileModal();
                loadFiles();
            } else {
                showToast(d.message || 'فشل الإنشاء', true);
            }
        }

        function filterFiles() {
            const search = document.getElementById('fileSearch').value.toLowerCase();
            const rows = document.querySelectorAll('#filesList tr');
            rows.forEach(row => {
                const text = row.innerText.toLowerCase();
                row.style.display = text.includes(search) ? '' : 'none';
            });
        }

        async function createNewServer() {
            const name = prompt('🏷️ أدخل اسم السيرفر الجديد:');
            if (!name) return;
            
            showToast('🔄 جاري إنشاء السيرفر...');
            const res = await fetch('/api/server/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name})
            });
            const d = await res.json();
            if (d.success) {
                showToast(d.message);
                loadServers();
            } else {
                showToast(d.message || 'فشل الإنشاء', true);
            }
        }

        async function logout() {
            showConfirm('🚪 تسجيل الخروج؟', async () => {
                await fetch('/api/logout', {method: 'POST'});
                sessionStorage.clear();
                localStorage.clear();
                window.location.href = '/login';
            });
        }

        checkAuth();
    </script>
</body>
</html>
