<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول | DARK PRO HOST</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية شبكية متحركة */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation span {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(108, 92, 231, 0.03);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        .bg-animation span:nth-child(1) {
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            animation-delay: 0s;
        }

        .bg-animation span:nth-child(2) {
            bottom: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            animation-delay: 5s;
        }

        .bg-animation span:nth-child(3) {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            animation-delay: 10s;
            opacity: 0.05;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.05); }
        }

        /* بطاقة تسجيل الدخول */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            margin: 20px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(18, 18, 24, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(108, 92, 231, 0.2);
            transition: all 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            border-color: rgba(108, 92, 231, 0.4);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.6);
        }

        /* الشعار */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6c5ce7, #a363d9);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: white;
            box-shadow: 0 15px 30px rgba(108, 92, 231, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 15px 30px rgba(108, 92, 231, 0.3); }
            50% { box-shadow: 0 20px 40px rgba(108, 92, 231, 0.5); }
        }

        .logo-name {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7, #a363d9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-badge {
            display: inline-block;
            background: rgba(108, 92, 231, 0.2);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            color: #a363d9;
            margin-top: 12px;
        }

        .logo-sub {
            font-size: 13px;
            color: #666;
            margin-top: 12px;
        }

        /* الحقول */
        .form-group {
            margin-bottom: 25px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            right: 18px;
            color: #6c5ce7;
            font-size: 18px;
            transition: all 0.3s;
        }

        .form-group input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            background: #121218;
            border: 2px solid #2a2a35;
            border-radius: 30px;
            color: #e0e0e0;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #6c5ce7;
            background: #1a1a24;
            outline: none;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1);
        }

        .form-group input::placeholder {
            color: #555;
            font-size: 14px;
        }

        /* خيار تذكرني */
        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
            font-size: 13px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #888;
        }

        .checkbox-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #6c5ce7;
        }

        /* زر الدخول */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6c5ce7, #a363d9);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* رابط إنشاء حساب */
        .register-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #2a2a35;
        }

        .register-link a {
            color: #6c5ce7;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .register-link a:hover {
            color: #a363d9;
            transform: translateX(-5px);
        }

        /* نموذج إنشاء حساب */
        #registerForm {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #2a2a35;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .register-title {
            color: #6c5ce7;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-register {
            background: linear-gradient(135deg, #00c864, #00a856);
        }

        .btn-register:hover {
            box-shadow: 0 10px 25px rgba(0, 200, 100, 0.3);
        }

        .btn-cancel {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }

        .btn-cancel:hover {
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
        }

        /* رسائل الخطأ والنجاح */
        .alert {
            display: none;
            padding: 14px 18px;
            border-radius: 30px;
            margin-bottom: 25px;
            font-size: 13px;
            text-align: center;
            animation: shake 0.4s ease;
        }

        .alert-error {
            background: rgba(255, 107, 107, 0.12);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .alert-success {
            background: rgba(0, 200, 100, 0.12);
            border: 1px solid rgba(0, 200, 100, 0.3);
            color: #00c864;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* تذييل */
        .footer {
            text-align: center;
            margin-top: 35px;
            font-size: 11px;
            color: #555;
        }

        .footer a {
            color: #6c5ce7;
            text-decoration: none;
        }

        /* شاشة تحميل */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(108, 92, 231, 0.2);
            border-top-color: #6c5ce7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 14px;
        }

        @media (max-width: 550px) {
            .login-card {
                padding: 35px 25px;
            }
            .logo-name {
                font-size: 26px;
            }
            .logo-icon {
                width: 65px;
                height: 65px;
                font-size: 32px;
            }
            .form-group input {
                padding: 12px 45px 12px 15px;
                font-size: 14px;
            }
            .btn-login {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-skull"></i>
                </div>
                <div class="logo-name">DARK PRO HOST</div>
                <div class="logo-badge">PROFESSIONAL HOSTING</div>
                <div class="logo-sub">استضافة احترافية | تشغيل مستمر 24/7</div>
            </div>

            <div id="alertBox" class="alert"></div>

            <!-- نموذج تسجيل الدخول -->
            <form id="loginForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="username" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password" required>
                    </div>
                </div>
                
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe"> تذكرني
                    </label>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> دخول
                </button>
            </form>

            <div class="register-link">
                <a onclick="showRegister()">
                    <i class="fas fa-user-plus"></i> إنشاء حساب جديد
                </a>
            </div>

            <!-- نموذج إنشاء حساب -->
            <div id="registerForm" style="display: none;">
                <div class="register-title">
                    <i class="fas fa-sparkles"></i> إنشاء حساب جديد
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="regUsername" placeholder="اسم المستخدم">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="regPassword" placeholder="كلمة المرور">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i class="fas fa-check-circle input-icon"></i>
                        <input type="password" id="regConfirmPassword" placeholder="تأكيد كلمة المرور">
                    </div>
                </div>
                <button class="btn-login btn-register" onclick="registerUser()">
                    <i class="fas fa-check"></i> إنشاء الحساب
                </button>
                <button class="btn-login btn-cancel" onclick="hideRegister()">
                    <i class="fas fa-times"></i> إلغاء
                </button>
            </div>

            <div class="footer">
                <span>© 2026 DARK PRO HOST</span> • 
                <span>استضافة سريعة وآمنة</span> • 
                <span>v4.0</span>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">جاري المعالجة...</div>
    </div>

    <script>
        function showAlert(message, isError = true) {
            const alertBox = document.getElementById('alertBox');
            alertBox.textContent = message;
            alertBox.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
            alertBox.style.display = 'block';
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 4000);
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = show ? 'flex' : 'none';
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                showAlert('⚠️ الرجاء إدخال اسم المستخدم وكلمة المرور');
                return;
            }

            showLoading(true);

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, remember_me: rememberMe})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showAlert('✅ تم تسجيل الدخول بنجاح، جاري التحويل...', false);
                    setTimeout(() => {
                        window.location.href = data.redirect || (data.is_admin ? '/admin' : '/dashboard');
                    }, 1000);
                } else {
                    showAlert('❌ ' + data.message);
                }
            } catch (err) {
                showAlert('❌ خطأ في الاتصال بالخادم');
            } finally {
                showLoading(false);
            }
        };

        function showRegister() {
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('regUsername').focus();
        }

        function hideRegister() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regConfirmPassword').value = '';
        }

        async function registerUser() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!username || !password) {
                showAlert('⚠️ الرجاء إدخال جميع البيانات');
                return;
            }
            
            if (password !== confirm) {
                showAlert('⚠️ كلمة المرور غير متطابقة');
                return;
            }
            
            if (password.length < 4) {
                showAlert('⚠️ كلمة المرور يجب أن تكون 4 أحرف على الأقل');
                return;
            }

            showLoading(true);

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showAlert('✅ ' + data.message + ' | يمكنك الآن تسجيل الدخول', false);
                    hideRegister();
                    document.getElementById('username').value = username;
                    document.getElementById('password').focus();
                } else {
                    showAlert('❌ ' + data.message);
                }
            } catch(err) {
                showAlert('❌ خطأ في الاتصال بالخادم');
            } finally {
                showLoading(false);
            }
        }

        async function checkExistingSession() {
            try {
                const res = await fetch('/api/current_user');
                const data = await res.json();
                if (data.success && data.username) {
                    window.location.href = data.is_admin ? '/admin' : '/dashboard';
                }
            } catch(e) {}
        }
        checkExistingSession();

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('registerForm').style.display === 'block') {
                    registerUser();
                }
            }
        });
    </script>
</body>
</html>
